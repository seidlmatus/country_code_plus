name: Publish to pub.dev

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Package Version
        id: read_version
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | cut -d' ' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Validate Tag Matches pubspec Version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "${{ steps.read_version.outputs.version }}" ]; then
            echo "Tag version ($tag) does not match pubspec version (${{ steps.read_version.outputs.version }})."
            exit 1
          fi

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    environment: pub.dev
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Validate Package
        run: flutter pub publish --dry-run
      - name: Setup pub.dev Credentials
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p ~/.pub-cache
          cat <<EOF > ~/.pub-cache/credentials.json
          ${{ secrets.PUB_CREDENTIALS_JSON }}
          EOF
      - name: Publish Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter pub publish -f
